kind = "web"
previewPath = "/"
title = "MochiMail"
version = "1.0.0"
id = "artifacts/mochi-mail"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23579

[services.development]
run = "pnpm --filter @workspace/mochi-mail run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mochi-mail", "run", "build" ]
publicDir = "artifacts/mochi-mail/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23579"
BASE_PATH = "/"
